<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${diaryEntry.id == null ? '기록 작성' : '기록 수정'}">기록 작성</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font 최적화 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg topbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand brand-logo" href="/diaries">하루한장</a>
        <a href="/diaries" class="btn btn-outline-secondary btn-soft">목록으로</a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card form-card">
                <div class="card-body">
                    <div class="soft-chip mb-3"
                         th:text="${diaryEntry.id == null ? '새 기록 작성' : '기록 수정'}">새 기록 작성</div>

                    <h1 class="detail-title mb-2"
                        th:text="${diaryEntry.id == null ? '오늘의 감사한 순간을 남겨보세요' : '기록을 다듬어보세요'}">
                        오늘의 감사한 순간을 남겨보세요
                    </h1>

                    <p class="text-muted mb-4">
                        짧은 감정, 태그, 그리고 사진 한 장만으로도 충분합니다.
                    </p>

                    <form th:action="${diaryEntry.id == null} ? @{/diaries} : @{/diaries/{id}/edit(id=${diaryEntry.id})}"
                          method="post"
                          th:object="${diaryEntry}"
                          enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label">날짜</label>
                            <input type="date" class="form-control" th:field="*{entryDate}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">제목</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{title}"
                                   placeholder="예: 따뜻한 커피 한 잔">
                            <div class="text-danger small mt-2"
                                 th:if="${#fields.hasErrors('title')}"
                                 th:errors="*{title}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">내용</label>
                            <textarea class="form-control"
                                      rows="7"
                                      th:field="*{content}"
                                      placeholder="오늘 감사했던 순간을 자유롭게 적어보세요."></textarea>
                            <div class="text-danger small mt-2"
                                 th:if="${#fields.hasErrors('content')}"
                                 th:errors="*{content}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">감정</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{emotion}"
                                       placeholder="예: happy, calm">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">태그</label>
                                <input type="text"
                                       class="form-control"
                                       th:field="*{tags}"
                                       placeholder="예: 가족, 커피, 일상">
                                <div class="form-text">쉼표로 여러 개 입력할 수 있어요.</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">이미지 업로드</label>
                            <input type="file" class="form-control" name="imageFile" accept="image/*">
                        </div>

                        <div class="mb-4" th:if="${diaryEntry.imagePath != null}">
                            <p class="fw-semibold mb-2">현재 이미지</p>
                            <img th:src="${diaryEntry.imagePath}"
                                 alt="현재 이미지"
                                 class="img-fluid rounded shadow-sm">
                        </div>

                        <div class="d-flex gap-2 flex-wrap">
                            <button type="submit" class="btn btn-brand">저장하기</button>
                            <a href="/diaries" class="btn btn-outline-secondary btn-soft">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
