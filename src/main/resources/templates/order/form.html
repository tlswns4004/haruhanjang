<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 생성</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg topbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand brand-logo" href="/diaries">하루한장</a>
        <a href="/orders" class="btn btn-outline-secondary btn-soft">주문 목록</a>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card form-card">
                <div class="card-body">
                    <div class="soft-chip mb-3">주문 생성</div>
                    <h1 class="detail-title mb-2">기록집 주문을 만들어보세요</h1>
                    <p class="text-muted mb-4">기간을 선택하면 해당 기간의 기록을 주문에 포함합니다.</p>

                    <form action="/orders/new" method="get" class="mb-4">
                        <div class="row">
                            <div class="col-md-5 mb-3">
                                <label class="form-label">시작일</label>
                                <input type="date" name="startDate" class="form-control" th:value="${startDate}">
                            </div>
                            <div class="col-md-5 mb-3">
                                <label class="form-label">종료일</label>
                                <input type="date" name="endDate" class="form-control" th:value="${endDate}">
                            </div>
                            <div class="col-md-2 mb-3 d-flex align-items-end">
                                <button type="submit" class="btn btn-outline-secondary btn-soft w-100">조회</button>
                            </div>
                        </div>
                    </form>

                    <form action="/orders" method="post" th:if="${diaries != null}">
                        <div class="mb-3">
                            <label class="form-label">주문명</label>
                            <input type="text" name="title" class="form-control" placeholder="예: 2026 봄 감사 기록집" required>
                        </div>

                        <input type="hidden" name="startDate" th:value="${startDate}">
                        <input type="hidden" name="endDate" th:value="${endDate}">

                        <div class="mb-4">
                            <h5 class="section-title mb-3">포함될 기록</h5>

                            <div th:if="${#lists.isEmpty(diaries)}" class="text-muted">
                                선택한 기간에 포함되는 기록이 없습니다.
                            </div>

                            <div class="card border-0 bg-light mb-2" th:each="diary : ${diaries}">
                                <div class="card-body">
                                    <div class="fw-bold" th:text="${diary.title}">제목</div>
                                    <div class="small text-muted mb-2" th:text="${diary.entryDate}">2026-04-22</div>
                                    <div class="small text-secondary"
                                         th:text="${#strings.length(diary.content) > 70 ? #strings.substring(diary.content,0,70) + '...' : diary.content}">
                                        내용
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-brand" th:disabled="${#lists.isEmpty(diaries)}">주문 생성하기</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
