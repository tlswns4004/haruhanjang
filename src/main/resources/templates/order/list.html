<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 목록</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg topbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand brand-logo" href="/diaries">하루한장</a>
        <div class="d-flex gap-2">
            <a href="/orders/new" class="btn btn-brand">+ 주문 만들기</a>
            <a href="/diaries" class="btn btn-outline-secondary btn-soft">기록 목록</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="hero-card mb-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <div class="soft-chip mb-3">책 제작 주문 관리</div>
                <h1 class="hero-title mb-2">기록을 한 권의 주문으로 묶어보세요.</h1>
                <p class="hero-desc mb-0">기간을 선택해 기록집 주문을 만들고, 상태를 관리할 수 있습니다.</p>
            </div>
            <a href="/orders/new" class="btn btn-brand btn-lg">주문 생성하기</a>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="card empty-card">
        <div class="card-body text-center py-5">
            <h4 class="fw-bold mb-3">아직 생성된 주문이 없습니다</h4>
            <p class="text-muted mb-4">기록이 충분히 쌓였다면 첫 주문을 만들어보세요.</p>
            <a href="/orders/new" class="btn btn-brand">주문 만들기</a>
        </div>
    </div>

    <div class="row g-4" th:if="${!#lists.isEmpty(orders)}">
        <div class="col-lg-6" th:each="order : ${orders}">
            <div class="diary-card h-100">
                <div class="card-body-premium">
                    <div class="mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <span class="emotion-badge"
                              th:text="${order.status.label}"
                              th:classappend="
                                ${order.status.name() == 'PENDING'} ? ' badge-warning' :
                                (${order.status.name() == 'PROCESSING'} ? ' badge-primary' :
                                (${order.status.name() == 'COMPLETED'} ? ' badge-success' : ''))
                              ">
                            주문 접수
                        </span>

                        <span class="diary-date"
                              th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">
                            2026-04-22 22:00
                        </span>
                    </div>

                    <h3 class="diary-title mb-2" th:text="${order.title}">주문명</h3>

                    <p class="text-muted mb-2">
                        기간:
                        <span th:text="${order.startDate}"></span>
                        ~
                        <span th:text="${order.endDate}"></span>
                    </p>

                    <p class="text-muted mb-4">
                        포함 기록 수:
                        <strong th:text="${#lists.size(order.orderItems)}">0</strong>개
                    </p>

                    <a th:href="@{/orders/{id}(id=${order.id})}"
                       class="btn btn-outline-secondary btn-soft btn-sm">
                        상세 보기
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
